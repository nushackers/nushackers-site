<li class="events-item item">
  <h3 class=hs-topic>{{ .event.topic }}{{- if and (ne .event.sign_up nil) ((time .event.date).After now) }} [<a href="{{ .event.sign_up }}">Sign up</a>]{{- end -}}</h3>
  <time class="hs-time" datetime={{ dateFormat "2006-01-02T15:04:05-07:00" .event.date }}>
    {{ dateFormat "Mon, Jan 2, 3:04pm" (time .event.date) }}
  </time>
  <address class="events-address">{{ .event.venue | safeHTML }}</address>
</li>
